# Drop-in for EUHub-co/build -> .github/workflows/azure-deploy.yml
#
# Azure is the primary deploy target: every push to main ships to Container Apps.
# The existing deploy.yml (GCP Cloud Run) stays as a manual (workflow_dispatch)
# fallback during the soak window.
#
# Repo prerequisites (GitHub -> Settings -> Environments -> "prod"):
#   Environment VARIABLES (not secrets):
#     AZURE_CLIENT_ID       = <deploy_client_ids["euhub-build-web"] from the apps stack>
#     AZURE_TENANT_ID       = 8c4f47c0-d3cc-4c9c-bc45-39bbf0eb18be
#     AZURE_SUBSCRIPTION_ID = 42d3345a-2568-48e0-a414-3fc00ee2cba7
#
# FORM DEFERRED (user call, 2026-07-18): build ships web-only, matching GCP prod
# (where the form is also unwired). The audit form needs, as ONE later change:
#   (a) client-side PUBLIC_TURNSTILE_SITE_KEY/PUBLIC_UMAMI_* — build's Dockerfile
#       has no ARG for these yet, so they must be added + passed as --build-arg
#       (they inline at `astro build`; static output);
#   (b) server-side WEBHOOK_URL/WEBHOOK_TOKEN/TURNSTILE_SECRET_KEY — as Key Vault
#       secret refs on the Container App (module + KV role already support it;
#       restore the `secrets` block in the apps map + `az keyvault secret set`).
# This workflow intentionally passes NO build-args so it doesn't imply otherwise.
#
# Auth is keyless: GitHub OIDC -> user-assigned managed identity (federated
# credential subject repo:EUHub-co/build:environment:prod — the deploy job's
# `environment: prod` below is what makes the OIDC subject match).

name: Deploy → Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC token for azure/login
  contents: read

concurrency:
  group: deploy-azure-web
  cancel-in-progress: false

env:
  ACR_NAME: acreuhubprod
  ACR_SERVER: acreuhubprod.azurecr.io
  IMAGE_NAME: euhub-build-web
  APP_NAME: ca-euhub-build-web
  RESOURCE_GROUP: rg-euhub-prod-apps

jobs:
  # EXACT mirror of the repo's own CI gate: the reusable quality-gates.yml
  # (format, typecheck, build+content-guard, Lighthouse (non-blocking),
  # Playwright smoke, SK i18n completeness). Zero invented steps.
  test:
    uses: ./.github/workflows/quality-gates.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: prod # scopes the AZURE_* vars AND shapes the OIDC subject
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC, keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image
        run: |
          az acr login --name "$ACR_NAME"
          docker build -t "$ACR_SERVER/$IMAGE_NAME:${{ github.sha }}" .
          docker push "$ACR_SERVER/$IMAGE_NAME:${{ github.sha }}"

      - name: Roll out new revision
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_SERVER/$IMAGE_NAME:${{ github.sha }}"

      - name: Health check
        run: |
          FQDN=$(az containerapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" \
                   --query properties.configuration.ingress.fqdn -o tsv)
          echo "Checking https://$FQDN/ (no dedicated health endpoint — smoke via homepage)"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "https://$FQDN/" > /dev/null; then
              echo "healthy"; exit 0
            fi
            echo "attempt $i failed; retrying in 10s"; sleep 10
          done
          echo "::error::new revision never became healthy"; exit 1
