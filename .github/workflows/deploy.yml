name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- Quality gates (same job graph ci.yml runs on every PR: quality,
  # Lighthouse, Playwright, SK i18n completeness) — re-run here so the exact
  # commit being deployed is verified, not just whatever passed on its PR. ---
  gates:
    uses: ./.github/workflows/quality-gates.yml

  # --- Deploy to GCP Cloud Run ---
  deploy:
    name: Build container & deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: gates
    environment: prod

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # --- Auth: use Workload Identity Federation (no long-lived keys) ---
      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # --- Configure Docker for Artifact Registry ---
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev

      # --- Build and push container ---
      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ secrets.CR_SERVICE_NAME }}:latest
            ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ secrets.CR_SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy to Cloud Run ---
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CR_SERVICE_NAME }}
          region: ${{ secrets.CR_LOCATION }}
          image: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ secrets.CR_SERVICE_NAME }}:${{ github.sha }}
          # Public env vars (non-sensitive — visible in Cloud Run console)
          env_vars: |
            PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
            PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.PUBLIC_UMAMI_SCRIPT_URL }}
            PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.PUBLIC_UMAMI_WEBSITE_ID }}
          # Secrets (stored in Secret Manager, mounted as env vars at runtime)
          # Each secret must be created in GCP Secret Manager first:
          #   gcloud secrets create WEBHOOK_URL --replication-policy=automatic
          #   echo -n "value" | gcloud secrets versions add WEBHOOK_URL
          secrets: |
            WEBHOOK_URL=${{ secrets.GCP_WEBHOOK_URL_SECRET }}:latest
            WEBHOOK_TOKEN=${{ secrets.GCP_WEBHOOK_TOKEN_SECRET }}:latest
            TURNSTILE_SECRET_KEY=${{ secrets.GCP_TURNSTILE_SECRET_KEY_SECRET }}:latest
          flags: |
            --port=8080
            --min-instances=0
            --max-instances=3
            --cpu=1
            --memory=512Mi
            --timeout=60
            --allow-unauthenticated

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ secrets.CR_SERVICE_NAME }} --region ${{ secrets.CR_LOCATION }} --format 'value(status.url)')
          echo "Deployed to: $URL"
